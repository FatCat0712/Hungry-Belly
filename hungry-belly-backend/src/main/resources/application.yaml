spring:
  application:
    name: hungry-belly-backend
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/foodies}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:Maisonhai@789}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  output:
    ansi:
      enabled: ALWAYS
supabase:
  bucketName: ${BUCKET_NAME}
  accessKey: ${SUPABASE_ACCESS_BUCKET_KEY}
  secretKey: ${SUPABASE_SECRET_BUCKET_KEY}
  regionName: ${SUPABASE_REGION}
  endpointUrl: ${SUPABASE_ENDPOINT}
  serviceRoleKey: ${SUPABASE_SERVICE_ROLE_KEY}
  endpointSignUrl: ${SUPABASE_SIGN_ENDPOINT}
